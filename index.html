<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Для тебе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    max-width: 700px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(255, 75, 92, 0.3);
}

/* кнопка */
button {
    margin-top: 20px;
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #ff4b5c, #ff1e3c);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* имя */
.name {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 15px;
}

.name span {
    opacity: 0;
    display: inline-block;
    transform: translateY(20px);
    background: linear-gradient(45deg, #ff4b5c, #ff9a9e, #6a82fb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: letterFade 0.5s forwards;
}

.name span:nth-child(1) { animation-delay: 0.1s; }
.name span:nth-child(2) { animation-delay: 0.3s; }
.name span:nth-child(3) { animation-delay: 0.5s; }
.name span:nth-child(4) { animation-delay: 0.7s; }

@keyframes letterFade {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* письмо */
.letter {
    text-align: left;
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-line;
}

/* курсор */
.cursor {
    display: inline-block;
    width: 2px;
    background: white;
    margin-left: 3px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* сердечки */
.heart {
    position: absolute;
    color: #ff4b5c;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Для тебе ❤️</h1>
    <p>У мене є дещо особливе…</p>
    <button onclick="startQuest()">Відкрити</button>
</div>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5c6e6cfd9e.mp3" type="audio/mpeg">
</audio>

<script>
const text = `З Днем народження, Нюша… 🎉

Іноді в житті зустрічаються люди, яких складно пояснити словами. Не тому що нічого сказати, а тому що все, що можна сказати — здається недостатнім. Ти саме така людина.

У тобі є щось дуже справжнє. Тиха доброта, щирість, тепло — не показне, не награне, а те, яке відчувається без зайвих слів. Ти не намагаєшся бути хорошою — ти просто така є. І саме це робить тебе особливою.

Ти з тих людей, поруч із якими стає спокійніше. Десь всередині з’являється відчуття, що все не так уже й складно, що все можна пережити. І, можливо, ти навіть не помічаєш, як сильно впливаєш на людей… але ти справді залишаєш слід. Теплий, справжній.

Дуже хочеться, щоб у твоєму житті було більше того ж тепла, яке ти даруєш іншим. Щоб поруч були люди, які бачать тебе по-справжньому — не поверхнево, а глибоко. Які цінують тебе не за щось, а просто за те, яка ти є.

Нехай у тебе буде місце, де тобі завжди спокійно. Моменти, в яких ти відчуваєш себе щасливою без причини. І люди, поруч із якими тобі не потрібно прикидатися.

І якщо раптом колись ти будеш сумніватися в собі… просто пам’ятай: ти — людина, яку неможливо замінити. Таких, як ти, справді дуже мало.

Нюша… ти дуже багато значиш.
І цей світ стає трохи кращим просто тому, що ти в ньому є ❤️`;

function startQuest() {
    document.getElementById("main").innerHTML = `
        <h2>Натисни ще раз…</h2>
        <button onclick="openLetter()">Відкрити лист 💌</button>
    `;
}

function openLetter() {
    document.getElementById("music").play();

    document.getElementById("main").innerHTML = `
        <div class="name">
            <span>Н</span><span>ю</span><span>ш</span><span>а</span> 💖
        </div>
        <div class="letter" id="letter"></div>
    `;

    typeText(text);
}

function typeText(text) {
    let i = 0;
    const speed = 25;
    const letter = document.getElementById("letter");

    function typing() {
        if (i < text.length) {
            letter.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
            i++;
            setTimeout(typing, speed);
        } else {
            letter.innerHTML = text;
        }
    }

    typing();
}

/* сердечки */
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 25) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 250);
</script>

</body>
</html>

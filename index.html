<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Для тебе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    max-width: 750px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(255, 75, 92, 0.3);
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #ff4b5c, #ff1e3c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { 
    transform: scale(1.1); 
}

.name {
    font-size: 52px;
    font-weight: bold;
    margin-bottom: 15px;
}

.name span {
    opacity: 0;
    display: inline-block;
    transform: translateY(20px);
    background: linear-gradient(45deg, #ff4b5c, #ff9a9e, #6a82fb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: letterFade 0.5s forwards;
}

.name span:nth-child(1){animation-delay:0.1s;}
.name span:nth-child(2){animation-delay:0.3s;}
.name span:nth-child(3){animation-delay:0.5s;}
.name span:nth-child(4){animation-delay:0.7s;}

@keyframes letterFade {
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

.letter {
    text-align: left;
    font-size: 18px;
    line-height: 1.7;
    white-space: pre-line;
}

.cursor {
    display: inline-block;
    width: 2px;
    background: white;
    margin-left: 3px;
    animation: blink 1s infinite;
}

@keyframes blink { 
    50% { opacity: 0; } 
}

.heart {
    position: absolute;
    color: #ff4b5c;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Для тебе ❤️</h1>
    <p>У мене є дещо особливе…</p>
    <button onclick="startQuest()">Відкрити</button>
</div>

<!-- Музика (файл music.mp3 має бути в тій самій папці) -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const text = `С днём рождения, Нюша… 🎉

Иногда в жизни встречаются люди, которых сложно объяснить словами. Не потому что нечего сказать, а потому что всё, что о них можно сказать — кажется недостаточным. Ты именно такой человек.

В тебе есть что-то очень настоящее. Тихая доброта, искренность, тепло — не показное, не наигранное, а то, которое чувствуется без лишних слов. Ты не стараешься быть хорошей — ты просто такая есть. И именно это делает тебя особенной.

Ты из тех людей, рядом с которыми становится спокойнее. Где-то внутри появляется ощущение, что всё не так уж и сложно, что всё можно пережить. И, возможно, ты даже не замечаешь, как сильно влияешь на людей… но ты правда оставляешь след. Тёплый, настоящий.

Очень хочется, чтобы в твоей жизни было больше того же тепла, которое ты даёшь другим. Чтобы рядом были люди, которые видят тебя по-настоящему — не поверхностно, а глубоко. Которые ценят тебя не за что-то, а просто за то, какая ты есть.

Пусть у тебя будет место, где тебе всегда спокойно. Моменты, в которых ты чувствуешь себя счастливой без причины. И люди, рядом с которыми тебе не нужно притворяться.

И если вдруг когда-нибудь ты будешь сомневаться в себе… просто помни: ты — человек, которого невозможно заменить. Таких, как ты, правда очень мало.

Нюша… ты очень многое значишь.
И этот мир становится чуть лучше просто потому, что ты в нём есть ❤️

С днём рождения тебя ✨`;

function startQuest() {
    document.getElementById("main").innerHTML = `
        <h2>Натисни ще раз…</h2>
        <button onclick="openLetter()">Відкрити лист 💌</button>
    `;
}

function openLetter() {

    const music = document.getElementById("music");
    music.volume = 0.5;
    music.play();

    document.getElementById("main").innerHTML = `
        <div class="name">
            <span>Н</span><span>ю</span><span>ш</span><span>а</span> 💖
        </div>
        <div class="letter" id="letter"></div>
    `;

    typeText(text);
}

function typeText(text) {
    let i = 0;
    const speed = 25;
    const letter = document.getElementById("letter");

    function typing() {
        if (i < text.length) {
            letter.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
            i++;
            setTimeout(typing, speed);
        } else {
            letter.innerHTML = text;
        }
    }

    typing();
}

setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 25) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 250);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Для тебе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

/* контейнер */
.container {
    text-align: center;
    max-width: 700px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(255, 75, 92, 0.3);
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #ff4b5c, #ff1e3c);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

/* подарок */
.gift {
    font-size: 80px;
    cursor: pointer;
    transition: transform 0.3s;
}
.gift:hover {
    transform: scale(1.2) rotate(5deg);
}

/* чат */
.chat {
    text-align: left;
    font-size: 18px;
    line-height: 1.6;
}
.msg {
    margin: 10px 0;
}
.you { color: #6a82fb; }
.her { color: #ff9a9e; }

/* письмо */
.letter {
    text-align: left;
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-line;
}

/* курсор */
.cursor {
    display: inline-block;
    width: 2px;
    background: white;
    margin-left: 3px;
    animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* сердечки */
.heart {
    position: absolute;
    color: #ff4b5c;
    animation: float 6s linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Для тебе ❤️</h1>
    <p>Я підготував дещо особливе…</p>
    <div class="gift" onclick="openGift()">🎁</div>
</div>

<audio id="music" loop>
    <!-- спокойная инструментальная -->
    <source src="https://cdn.pixabay.com/audio/2023/03/27/audio_1c9c1c9a6d.mp3" type="audio/mpeg">
</audio>

<script>

/* авто-музыка при первом клике */
document.addEventListener("click", () => {
    const music = document.getElementById("music");
    music.volume = 0.5;
    music.play();
}, { once: true });

/* открытие подарка */
function openGift() {
    document.getElementById("main").innerHTML = `
        <h2>Тільки для тебе… 💬</h2>
        <div class="chat" id="chat"></div>
    `;
    startChat();
}

/* псевдо чат */
const messages = [
    {text: "Привіт…", type: "you"},
    {text: "Привіт 😊", type: "her"},
    {text: "У мене є дещо для тебе…", type: "you"},
    {text: "Справді?", type: "her"},
    {text: "Так… відкрий ❤️", type: "you"}
];

function startChat() {
    let i = 0;
    const chat = document.getElementById("chat");

    function showMsg() {
        if (i < messages.length) {
            const msg = document.createElement("div");
            msg.className = "msg " + messages[i].type;
            msg.innerText = messages[i].text;
            chat.appendChild(msg);
            i++;
            setTimeout(showMsg, 1200);
        } else {
            setTimeout(showLetter, 1000);
        }
    }

    showMsg();
}

/* письмо */
const text = `З Днем народження, Нюша… 🎉

Ти дуже особлива людина.
З тобою стає тепліше навіть у звичайний день.

І я просто хочу щоб ти знала…
ти дуже багато значиш ❤️`;

function showLetter() {
    document.getElementById("main").innerHTML = `
        <h2>💌</h2>
        <div class="letter" id="letter"></div>
        <button onclick="secret()">...</button>
    `;
    typeText(text);
}

/* печать текста */
function typeText(text) {
    let i = 0;
    const letter = document.getElementById("letter");

    function typing() {
        if (i < text.length) {
            letter.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
            i++;
            setTimeout(typing, 25);
        } else {
            letter.innerHTML = text;
            heartExplosion();
        }
    }

    typing();
}

/* секрет */
function secret() {
    document.getElementById("main").innerHTML = `
        <h2>Ти мені подобаєшся 💖</h2>
        <p>Дуже сильно...</p>
    `;
}

/* сердечки */
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 25) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);

/* взрыв сердец */
function heartExplosion() {
    for (let i = 0; i < 30; i++) {
        const heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.style.position = "absolute";
        heart.style.left = "50%";
        heart.style.top = "50%";
        heart.style.transform = `translate(${Math.random()*400-200}px, ${Math.random()*400-200}px)`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2000);
    }
}

/* частицы за мышкой */
document.addEventListener("mousemove", (e) => {
    const dot = document.createElement("div");
    dot.style.position = "absolute";
    dot.style.left = e.pageX + "px";
    dot.style.top = e.pageY + "px";
    dot.style.width = "5px";
    dot.style.height = "5px";
    dot.style.background = "#ff4b5c";
    dot.style.borderRadius = "50%";
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 500);
});

</script>

</body>
</html>
